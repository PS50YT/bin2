<html>
<head>
 
  <style>
   
   span {

 body {
    font-family:boldjiOP;
    background-image:url(https://raw.githubusercontent.com/PS50YT/Indoca-Launcher/refs/heads/main/images/WmY6ABPrlopX.webp);
    background-repeat:no-repeat;

  @font-face {
  font-family: 'boldjiOP';
  src: url(https://github.com/PS50YT/Indoca-Launcher/raw/refs/heads/main/New%20Web%20Indoca/assests/MinecraftRegular-Bmg3.otf);
}
  /* Dropdown Button */
.dropbtn {
  font-family:boldjiOP;
  background-color: #3498DB;
  color: white;
  padding: 16px;
  font-size: 16px;
  border: none;
  cursor: pointer;
}

/* Dropdown button on hover & focus */
.dropbtn:hover, .dropbtn:focus {
  background-color: #2980B9;
}

/* The container <div> - needed to position the dropdown content */
.dropdown {
  position: relative;
  display: inline-block;
}

/* Dropdown Content (Hidden by Default) */
.dropdown-content {
  display: none;
  position: absolute;
  background-color: #f1f1f1;
  min-width: 160px;
  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
  z-index: 1;
}

/* Links inside the dropdown */
.dropdown-content a {
  color: black;
  padding: 12px 16px;
  text-decoration: none;
  display: block;
}

/* Change color of dropdown links on hover */
.dropdown-content a:hover {background-color: #ddd;}

/* Show the dropdown menu (use JS to add this class to the .dropdown-content container when the user clicks on the dropdown button) */
.show {display:block;}
  </style>
  <title>Indoca Launcher PE</title>
</head>
<body>
  <img src="https://indoca-launcher.vercel.app/New%20Web%20Indoca/assests/Indoca-Laucher.png" width="100%" height="100%">
  
  <br><div class="dropdown">
  <button onclick="myFunction()" class="dropbtn">Play Minecraft</button>
  <div id="myDropdown" class="dropdown-content">

    <a href="https://eaglercraft.ir/play/eagly-1.20-wasm?touch=true&userscript=irv77-eaglercraft-mobile.js">EaglyMC 1.20 (Modded)</a>
  </div>
</div>
   <br>
   <br>
   <a href="https://indoca-launcher.vercel.app/pe.html">Official Site</a>
   <p><span>Important :-<br>• Play using landscape mode</span>
   </p>
   
<iframe id="widget" src="https://mcdf.wiki.gg/" width="100%" height="500" allowtransparency="true" frameborder="0"></iframe>

 <script>
  /* When the user clicks on the button,
toggle between hiding and showing the dropdown content */
function myFunction() {
  document.getElementById("myDropdown").classList.toggle("show");
}

// Close the dropdown menu if the user clicks outside of it
window.onclick = function(event) {
  if (!event.target.matches('.dropbtn')) {
    var dropdowns = document.getElementsByClassName("dropdown-content");
    var i;
    for (i = 0; i < dropdowns.length; i++) {
      var openDropdown = dropdowns[i];
      if (openDropdown.classList.contains('show')) {
        openDropdown.classList.remove('show');
      }
    }
  }
}
  </script>
</body>
</html>
